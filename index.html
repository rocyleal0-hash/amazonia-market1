<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Amazonia MARKET</title>
<meta name="description" content="Tienda virtual Amazonia MARKET — Delivery GRATIS en toda la zona de Coro."/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E🛒%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700;800;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet"/>

<!-- Carga del archivo CSS dentro de public -->
<link rel="stylesheet" href="public/styles.css"/>

</head>
<body>

<!-- =============== TOPBAR AZUL =============== -->
<header id="topbar" class="am-topbar">
  <div class="am-delivery-banner">
    <div class="am-delivery-track" id="deliveryTrack"></div>
  </div>

  <div class="am-topbar-row am-wrap-wide">
    <button id="btnMenu" class="am-tb-menu" title="Menú" aria-label="Menú">☰</button>

    <a href="./" class="am-brand" id="brandLink">
      <img id="brandLogo" class="am-brand-logo" alt="logo" style="display:none"/>
      <div id="brandTitles"></div>
    </a>

    <form id="searchForm" class="am-search">
      <input id="searchInput" type="text" placeholder="¿Qué desearías buscar hoy?" autocomplete="off"/>
      <button type="submit" class="am-search-btn" aria-label="Buscar">🔍</button>
    </form>

    <div class="am-tb-item am-tb-account" title="Cuenta">
      <span class="am-tb-icon">👤</span>
      <span>
        <span class="am-tb-sub">Iniciar sesión / Registrar</span>
        <span class="am-tb-strong">Mi cuenta</span>
      </span>
    </div>

    <div class="am-socials" id="amSocials"></div>

    <a class="am-cart-btn" href="?view=cart" title="Ver carrito" aria-label="Ver carrito">
      🛒<span class="am-cart-badge" id="cartBadge" hidden></span>
    </a>
  </div>

  <!-- Panel menú lateral -->
  <div id="menuPanel" class="am-menu-panel" hidden></div>
</header>

<!-- =============== CIRCULOS DE CATEGORIAS =============== -->
<section class="am-cats-wrap" id="catsWrap">
  <div class="am-cats-scroll" id="catsScroll"></div>
</section>

<!-- =============== CONTENIDO PRINCIPAL =============== -->
<main class="am-wrap" id="mainContent"></main>

<!-- =============== MODAL AGREGAR CANTIDAD =============== -->
<div id="qtyModal" class="am-modal-overlay" hidden>
  <div class="am-modal">
    <img id="qtyImg" class="am-modal-img" alt=""/>
    <div id="qtyName" class="am-modal-name"></div>
    <div id="qtyPrice" class="am-modal-price"></div>
    <div class="am-qty-row">
      <button id="qtyMinus" class="am-qty-btn">−</button>
      <input id="qtyInput" type="number" min="1" value="1"/>
      <button id="qtyPlus" class="am-qty-btn">+</button>
    </div>
    <div class="am-modal-actions">
      <button id="qtyCancel" class="am-btn am-btn-ghost">Cancelar</button>
      <button id="qtyConfirm" class="am-btn am-btn-primary">Añadir al carrito</button>
    </div>
  </div>
</div>

<div id="toast" class="am-toast" hidden></div>

<!-- =============== BOTONES FLOTANTES =============== -->
<a id="btnWaFloat" class="am-float am-float-wa" href="#" target="_blank" rel="noopener" aria-label="Escríbenos por WhatsApp" title="Escríbenos por WhatsApp">
  <svg viewBox="0 0 32 32" width="30" height="30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path fill="#fff" d="M19.11 17.29c-.29-.15-1.7-.84-1.96-.93-.26-.1-.45-.15-.64.14-.19.29-.73.93-.9 1.12-.17.19-.33.22-.62.07-.29-.15-1.22-.45-2.33-1.43-.86-.77-1.44-1.72-1.61-2.01-.17-.29-.02-.45.13-.6.13-.13.29-.34.44-.51.15-.17.2-.29.29-.48.1-.19.05-.36-.02-.51-.07-.15-.64-1.55-.88-2.13-.23-.55-.47-.48-.64-.49l-.55-.01c-.19 0-.5.07-.76.36-.26.29-1 .98-1 2.39 0 1.41 1.02 2.77 1.17 2.96.15.19 2.01 3.07 4.87 4.31.68.29 1.21.47 1.62.6.68.22 1.3.19 1.79.12.55-.08 1.7-.69 1.94-1.36.24-.67.24-1.24.17-1.36-.07-.12-.26-.19-.55-.34zM16 3.2C8.93 3.2 3.2 8.93 3.2 16c0 2.51.72 4.85 1.97 6.83L3.2 28.8l6.14-1.94A12.75 12.75 0 0 0 16 28.8C23.07 28.8 28.8 23.07 28.8 16S23.07 3.2 16 3.2zm0 23.3c-2.19 0-4.24-.66-5.94-1.79l-.42-.27-3.64 1.15 1.17-3.55-.28-.44A10.6 10.6 0 0 1 5.4 16C5.4 10.15 10.15 5.4 16 5.4c5.85 0 10.6 4.75 10.6 10.6 0 5.85-4.75 10.5-10.6 10.5z"/>
  </svg>
</a>

<a id="btnPayNow" class="am-float am-float-pay" href="?view=cart" hidden>PAGAR AHORA</a>

<!-- Carga de Javascript desde la carpeta public -->
<script src="public/app.js"></script>
</body>
</html>
